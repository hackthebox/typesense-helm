{{- if .Values.gateway.enabled }}
{{- $name := .Release.Name -}}
{{- $svcPort := .Values.service.port -}}
{{- $gw := .Values.gateway -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "typesense.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gw.parentRefs.default.name }}
      namespace: {{ $gw.parentRefs.default.namespace | default "istio-system" }}
  {{- range $gw.parentRefs.extras }}
    - name: {{ .name }}
      namespace: {{ .namespace | default "istio-system" }}
  {{- end }}
  hostnames:
    {{- range $gw.hosts }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $gw.prefix }}
      backendRefs:
        - name: {{ include "typesense.fullname" . }}-svc
          port: {{ $svcPort }}
{{- end }}
