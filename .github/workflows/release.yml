name: Release Chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: write
      statuses: write

  release:
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      is_rc: ${{ steps.chart.outputs.is_rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Helm version
        run: echo "HELM_VERSION=$(cat .helm-version)" >> "${GITHUB_ENV}"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Login to GHCR
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HELM_REGISTRY_USER: ${{ github.actor }}
        run: echo "${HELM_REGISTRY_TOKEN}" | helm registry login "${REGISTRY}" -u "${HELM_REGISTRY_USER}" --password-stdin

      - name: Derive release version from tag
        id: chart
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_REF#v}"
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')

          # For stable releases, tag must match Chart.yaml exactly (v1.0.0 -> 1.0.0)
          # For RC releases, tag must start with Chart.yaml version (v1.0.0-rc.1 -> 1.0.0)
          BASE_VERSION="${TAG_VERSION%%-rc.*}"
          if [ "${BASE_VERSION}" != "${CHART_VERSION}" ]; then
            echo "::error::Tag base version (${BASE_VERSION}) does not match Chart.yaml version (${CHART_VERSION})"
            exit 1
          fi

          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "name=${CHART_NAME}" >> "${GITHUB_OUTPUT}"
          echo "is_rc=$( [[ "${TAG_VERSION}" == *-rc.* ]] && echo true || echo false )" >> "${GITHUB_OUTPUT}"

      - name: Mark pre-release in Chart.yaml for RC builds
        if: steps.chart.outputs.is_rc == 'true'
        run: |
          yq e -i '.annotations."artifacthub.io/prerelease" = "true"' Chart.yaml

      - name: Package chart
        env:
          RELEASE_VERSION: ${{ steps.chart.outputs.version }}
        run: helm package . --version "${RELEASE_VERSION}"

      - name: Push chart to GHCR
        env:
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: helm push "${CHART_NAME}-${CHART_VERSION}.tgz" "oci://${REGISTRY}/${REPO_OWNER}/helm"

      - name: Sign chart with Cosign (keyless)
        env:
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          DIGEST=$(crane digest "${REGISTRY}/${REPO_OWNER}/helm/${CHART_NAME}:${CHART_VERSION}")
          cosign sign --yes "${REGISTRY}/${REPO_OWNER}/helm/${CHART_NAME}@${DIGEST}"

      - name: Summary
        env:
          CHART_NAME: ${{ steps.chart.outputs.name }}
          CHART_VERSION: ${{ steps.chart.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "### Chart Published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **Chart:** ${CHART_NAME}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **Version:** ${CHART_VERSION}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **OCI:** \`oci://${REGISTRY}/${REPO_OWNER}/helm/${CHART_NAME}:${CHART_VERSION}\`" >> "${GITHUB_STEP_SUMMARY}"

  create-release:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          prerelease: ${{ needs.release.outputs.is_rc == 'true' }}
          make_latest: ${{ needs.release.outputs.is_rc != 'true' }}
