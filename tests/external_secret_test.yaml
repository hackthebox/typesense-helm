suite: Secrets
chart:
  version: 1.1.0
release:
  name: foo
  namespace: bar
templates:
  - external-secret.yaml
tests:
  - it: should not render ExternalSecret by default
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 0
  - it: should render ExternalSecret when enabled with required fields
    set:
      secrets:
        externalSecret:
          enabled: true
          storeName: my-secret-store
          extractKey: my/path/typesense
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 1
      - containsDocument:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          name: foo-typesense-secret
          namespace: bar
      - contains:
          path: .spec.dataFrom
          content:
            extract:
              key: my/path/typesense
      - equal:
          path: .spec.target.name
          value: foo-typesense-secret
      - equal:
          path: .spec.secretStoreRef.name
          value: my-secret-store
  - it: should not render ExternalSecret when disabled
    set:
      secrets:
        externalSecret:
          enabled: false
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 0
  - it: should allow overriding the secret store name
    set:
      secrets:
        externalSecret:
          enabled: true
          storeName: my-custom-store
          extractKey: my/path
    asserts:
      - notFailedTemplate: {}
      - equal:
          path: .spec.secretStoreRef.name
          value: my-custom-store
  - it: should use custom secretName for ExternalSecret target when provided
    set:
      secrets:
        secretName: my-custom-secret
        externalSecret:
          enabled: true
          extractKey: foo/bar/typesense
    asserts:
      - notFailedTemplate: {}
      - equal:
          path: .spec.target.name
          value: my-custom-secret
