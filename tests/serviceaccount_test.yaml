suite: ServiceAccount
chart:
  version: 1.0.0
release:
  name: foo
  namespace: bar
templates:
  - serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 1
      - containsDocument:
          apiVersion: v1
          kind: ServiceAccount
          name: foo-typesense
          namespace: bar
      - equal:
          path: .automountServiceAccountToken
          value: false
  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 0
  - it: should allow overriding the ServiceAccount name
    set:
      serviceAccount:
        name: my-custom-sa
    asserts:
      - notFailedTemplate: {}
      - containsDocument:
          apiVersion: v1
          kind: ServiceAccount
          name: my-custom-sa
          namespace: bar
  - it: should add annotations when provided
    set:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
    asserts:
      - notFailedTemplate: {}
      - equal:
          path: .metadata.annotations
          value:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
